<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Pinning: each desktop keeps its own set of pinned apps; star-marked apps are pinned to every desktop">
  <defs>
    <linearGradient id="wpc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E6EEFF"/><stop offset="1" stop-color="#CFE0FF"/></linearGradient>
    <linearGradient id="wpm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E6F8EF"/><stop offset="1" stop-color="#CDEFDD"/></linearGradient>
    <linearGradient id="wpd" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F3E9FE"/><stop offset="1" stop-color="#E6D4FB"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#21305a" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1000" height="470" fill="#F5F7FB"/>
  <text x="40" y="46" font-family="-apple-system,'SF Pro Display',Arial,sans-serif" font-size="22" font-weight="800" fill="#1D1D1F">Pin apps per desktop</text>
  <text x="40" y="70" font-family="-apple-system,Arial,sans-serif" font-size="14" fill="#5b6472">Each desktop keeps its own set — even apps that aren't running yet.</text>

  <!-- legend -->
  <g font-family="Arial,sans-serif" font-size="13" font-weight="600">
    <circle cx="640" cy="40" r="6" fill="#34C759"/><text x="652" y="45" fill="#6E6E73">running</text>
    <circle cx="742" cy="40" r="6" fill="#8E8E93" opacity="0.45"/><text x="754" y="45" fill="#6E6E73">pinned, not running</text>
    <text x="918" y="45" fill="#C77A00" font-size="15">★</text><text x="932" y="45" fill="#6E6E73">all desktops</text>
  </g>

  <!-- ===== CARD: Code ===== -->
  <g transform="translate(50,96)">
    <g filter="url(#sh)"><rect width="280" height="300" rx="16" fill="#fff"/></g>
    <rect width="280" height="44" rx="16" fill="#fff"/><rect y="28" width="280" height="16" fill="#fff"/>
    <circle cx="26" cy="22" r="7" fill="#5C8FFC"/><text x="44" y="27" font-family="-apple-system,Arial,sans-serif" font-size="16" font-weight="800" fill="#1D1D1F">Code</text>
    <rect x="16" y="56" width="248" height="172" rx="10" fill="url(#wpc)"/>
    <!-- dock -->
    <rect x="40" y="244" width="200" height="42" rx="13" fill="#1D1D1F" opacity="0.9"/>
    <rect x="54" y="254" width="36" height="22" rx="6" fill="#5C8FFC"/>
    <rect x="98" y="254" width="36" height="22" rx="6" fill="#30B14E"/>
    <rect x="142" y="254" width="36" height="22" rx="6" fill="#FF9F0A" opacity="0.42"/>
    <rect x="186" y="254" width="36" height="22" rx="6" fill="#FFD60A"/><text x="204" y="270" text-anchor="middle" font-size="13" font-weight="800" fill="#7a5a00">★</text>
  </g>

  <!-- ===== CARD: Comms ===== -->
  <g transform="translate(360,96)">
    <g filter="url(#sh)"><rect width="280" height="300" rx="16" fill="#fff"/></g>
    <circle cx="26" cy="22" r="7" fill="#16B5A6"/><text x="44" y="27" font-family="-apple-system,Arial,sans-serif" font-size="16" font-weight="800" fill="#1D1D1F">Comms</text>
    <rect x="16" y="56" width="248" height="172" rx="10" fill="url(#wpm)"/>
    <rect x="40" y="244" width="200" height="42" rx="13" fill="#1D1D1F" opacity="0.9"/>
    <rect x="54" y="254" width="36" height="22" rx="6" fill="#16B5A6"/>
    <rect x="98" y="254" width="36" height="22" rx="6" fill="#5C8FFC"/>
    <rect x="142" y="254" width="36" height="22" rx="6" fill="#FF3B30" opacity="0.42"/>
    <rect x="186" y="254" width="36" height="22" rx="6" fill="#FFD60A"/><text x="204" y="270" text-anchor="middle" font-size="13" font-weight="800" fill="#7a5a00">★</text>
  </g>

  <!-- ===== CARD: Design ===== -->
  <g transform="translate(670,96)">
    <g filter="url(#sh)"><rect width="280" height="300" rx="16" fill="#fff"/></g>
    <circle cx="26" cy="22" r="7" fill="#AF52DE"/><text x="44" y="27" font-family="-apple-system,Arial,sans-serif" font-size="16" font-weight="800" fill="#1D1D1F">Design</text>
    <rect x="16" y="56" width="248" height="172" rx="10" fill="url(#wpd)"/>
    <rect x="40" y="244" width="200" height="42" rx="13" fill="#1D1D1F" opacity="0.9"/>
    <rect x="54" y="254" width="36" height="22" rx="6" fill="#AF52DE"/>
    <rect x="98" y="254" width="36" height="22" rx="6" fill="#FF2D92" opacity="0.42"/>
    <rect x="142" y="254" width="36" height="22" rx="6" fill="#5AC8FA"/>
    <rect x="186" y="254" width="36" height="22" rx="6" fill="#FFD60A"/><text x="204" y="270" text-anchor="middle" font-size="13" font-weight="800" fill="#7a5a00">★</text>
  </g>

  <!-- caption -->
  <g transform="translate(50,418)">
    <rect width="900" height="40" rx="12" fill="#EFE9FE"/>
    <text x="20" y="25" font-family="-apple-system,Arial,sans-serif" font-size="14" font-weight="600" fill="#5733CC">Pins survive reboots — keyed to each desktop's persistent Space UUID, saved in ~/.config/powerspaces/pins.json</text>
  </g>
</svg>
