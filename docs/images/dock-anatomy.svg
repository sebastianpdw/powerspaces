<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460" role="img" aria-label="Anatomy of the per-Space dock: hover to magnify, dimmed apps are pinned but not running, click to focus, and more">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F0ECFB"/><stop offset="1" stop-color="#DED3F7"/></linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#10204a" flood-opacity="0.30"/></filter>
  </defs>
  <rect width="1000" height="460" fill="url(#wall)"/>
  <text x="40" y="48" font-family="-apple-system,'SF Pro Display',Arial,sans-serif" font-size="22" font-weight="800" fill="#1D1D1F">The per-Space dock</text>
  <text x="40" y="72" font-family="-apple-system,Arial,sans-serif" font-size="14" fill="#5b6472">A floating bar showing only the apps on the desktop you're looking at.</text>

  <!-- top callout: only apps on this desktop -->
  <g transform="translate(388,108)">
    <rect width="224" height="36" rx="18" fill="#5733CC"/>
    <text x="112" y="23" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="14" font-weight="700" fill="#fff">Only apps on THIS desktop</text>
  </g>
  <path d="M500 144 V196" stroke="#5733CC" stroke-width="2.5" stroke-dasharray="2 5" stroke-linecap="round"/>

  <!-- THE DOCK BAR -->
  <g filter="url(#sh)">
    <rect x="220" y="198" width="560" height="96" rx="24" fill="#1D1D1F" opacity="0.92"/>
  </g>
  <rect x="220" y="198" width="560" height="96" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- tiles (centers at x = 300,380,460,540,620,700; tile size 56 unless magnified) -->
  <!-- t1 blue -->
  <rect x="272" y="218" width="56" height="56" rx="13" fill="#5C8FFC"/><circle cx="300" cy="246" r="11" fill="#fff" opacity="0.9"/>
  <!-- t2 magnified (hover) teal -->
  <circle cx="380" cy="240" r="58" fill="url(#halo)"/>
  <rect x="343" y="203" width="74" height="74" rx="17" fill="#16B5A6"/><rect x="364" y="224" width="32" height="32" rx="8" fill="#fff" opacity="0.92"/>
  <!-- t3 orange -->
  <rect x="432" y="218" width="56" height="56" rx="13" fill="#FF9F0A"/><path d="M448 252 l12 -22 12 22 z" fill="#fff" opacity="0.9"/>
  <!-- t4 purple -->
  <rect x="512" y="218" width="56" height="56" rx="13" fill="#AF52DE"/><rect x="528" y="234" width="24" height="24" rx="5" fill="#fff" opacity="0.9"/>
  <!-- t5 dimmed (pinned, not running) -->
  <rect x="592" y="218" width="56" height="56" rx="13" fill="#8E8E93" opacity="0.42"/><circle cx="620" cy="246" r="11" fill="#fff" opacity="0.5"/>
  <!-- t6 green -->
  <rect x="672" y="218" width="56" height="56" rx="13" fill="#34C759"/><circle cx="700" cy="246" r="11" fill="#fff" opacity="0.9"/>

  <!-- inline tags under special tiles -->
  <g transform="translate(330,300)">
    <rect width="100" height="26" rx="13" fill="#fff" stroke="#D9CCF9"/><text x="50" y="17" text-anchor="middle" font-family="Arial,sans-serif" font-size="12.5" font-weight="700" fill="#5733CC">hover ✦</text>
  </g>
  <g transform="translate(560,300)">
    <rect width="170" height="26" rx="13" fill="#fff" stroke="#D2D2D7"/><text x="85" y="17" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#6E6E73">pinned · not running</text>
  </g>

  <!-- interaction legend (bottom) -->
  <g font-family="-apple-system,Arial,sans-serif">
    <!-- chip 1 -->
    <g transform="translate(38,372)">
      <rect width="228" height="58" rx="13" fill="#fff" stroke="#E1E6F0"/>
      <g transform="translate(18,17)" fill="#5733CC" stroke="#fff" stroke-width="1"><path d="M0,0 L0,20 L5,15 L9,22 L12,21 L8,14 L15,14 Z"/></g>
      <text x="46" y="25" font-family="Arial,sans-serif" font-size="13.5" font-weight="700" fill="#1D1D1F">Click = focus</text>
      <text x="46" y="44" font-family="Arial,sans-serif" font-size="12.5" fill="#6E6E73">click again = minimize</text>
    </g>
    <!-- chip 2 -->
    <g transform="translate(278,372)">
      <rect width="228" height="58" rx="13" fill="#fff" stroke="#E1E6F0"/>
      <rect x="14" y="18" width="26" height="22" rx="5" fill="#EFE9FE"/><text x="27" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="800" fill="#5733CC">⇧</text>
      <text x="50" y="25" font-family="Arial,sans-serif" font-size="13.5" font-weight="700" fill="#1D1D1F">Shift / Option-click</text>
      <text x="50" y="44" font-family="Arial,sans-serif" font-size="12.5" fill="#6E6E73">= open a new window</text>
    </g>
    <!-- chip 3 -->
    <g transform="translate(518,372)">
      <rect width="228" height="58" rx="13" fill="#fff" stroke="#E1E6F0"/>
      <rect x="14" y="18" width="26" height="22" rx="5" fill="#EFE9FE"/><text x="27" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#5733CC">☰</text>
      <text x="50" y="25" font-family="Arial,sans-serif" font-size="13.5" font-weight="700" fill="#1D1D1F">Right-click menu</text>
      <text x="50" y="44" font-family="Arial,sans-serif" font-size="12.5" fill="#6E6E73">pin · close · quit</text>
    </g>
    <!-- chip 4 -->
    <g transform="translate(758,372)">
      <rect width="204" height="58" rx="13" fill="#fff" stroke="#E1E6F0"/>
      <rect x="14" y="18" width="26" height="22" rx="5" fill="#EFE9FE"/><text x="27" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#5733CC">⤓</text>
      <text x="50" y="25" font-family="Arial,sans-serif" font-size="13.5" font-weight="700" fill="#1D1D1F">Drag onto the bar</text>
      <text x="50" y="44" font-family="Arial,sans-serif" font-size="12.5" fill="#6E6E73">= pin to this desktop</text>
    </g>
  </g>
</svg>
