<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520" role="img" aria-label="Smart-launch decision: focus here, launch here, or open a new window here — never jump away">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8C66FA"/><stop offset="1" stop-color="#5733CC"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1B3A8A" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="920" height="520" fill="#F5F7FB"/>

  <!-- Start node -->
  <g filter="url(#sh)">
    <rect x="350" y="28" width="220" height="58" rx="14" fill="url(#blue)"/>
  </g>
  <text x="460" y="64" text-anchor="middle" font-family="-apple-system,'SF Pro Text',Arial,sans-serif" font-size="20" font-weight="700" fill="#fff">You open an app</text>

  <!-- connectors -->
  <g fill="none" stroke="#B9C6E6" stroke-width="2.5">
    <path d="M460 86 V120 H160 V172"/>
    <path d="M460 120 V172"/>
    <path d="M460 86 V120 H760 V172"/>
  </g>

  <!-- Card A: focus -->
  <g filter="url(#sh)"><rect x="34" y="174" width="252" height="296" rx="16" fill="#fff"/></g>
  <rect x="34" y="174" width="252" height="50" rx="16" fill="#EFE9FE"/>
  <rect x="34" y="208" width="252" height="16" fill="#EFE9FE"/>
  <text x="160" y="205" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="14.5" font-weight="700" fill="#5733CC">Has a window HERE?</text>
  <!-- mini desktop with app present -->
  <rect x="74" y="246" width="172" height="104" rx="9" fill="#F1F4FB" stroke="#E1E6F0"/>
  <rect x="92" y="266" width="60" height="48" rx="6" fill="#5C8FFC"/>
  <rect x="166" y="266" width="34" height="34" rx="6" fill="#D7DEEC"/>
  <circle cx="200" cy="334" r="9" fill="#34C759"/>
  <path d="M196 334 l3 3 6 -7" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(40,372)">
    <rect width="240" height="76" rx="11" fill="#E8F8ED"/>
    <text x="120" y="32" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="17" font-weight="800" fill="#248A3D">Focus that window</text>
    <text x="120" y="56" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="14" font-weight="600" fill="#3aa05a">no jump — you stay put</text>
  </g>

  <!-- Card B: launch -->
  <g filter="url(#sh)"><rect x="334" y="174" width="252" height="296" rx="16" fill="#fff"/></g>
  <rect x="334" y="174" width="252" height="50" rx="16" fill="#EFE9FE"/>
  <rect x="334" y="208" width="252" height="16" fill="#EFE9FE"/>
  <text x="460" y="205" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="14.5" font-weight="700" fill="#5733CC">Not running anywhere?</text>
  <rect x="374" y="246" width="172" height="104" rx="9" fill="#F1F4FB" stroke="#E1E6F0"/>
  <text x="460" y="304" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#aab2c2">(empty desktop)</text>
  <g transform="translate(340,372)">
    <rect width="240" height="76" rx="11" fill="#E8F8ED"/>
    <text x="120" y="32" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="17" font-weight="800" fill="#248A3D">Launch it here</text>
    <text x="120" y="56" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="14" font-weight="600" fill="#3aa05a">first window lands here</text>
  </g>

  <!-- Card C: new window -->
  <g filter="url(#sh)"><rect x="634" y="174" width="252" height="296" rx="16" fill="#fff"/></g>
  <rect x="634" y="174" width="252" height="50" rx="16" fill="#EFE9FE"/>
  <rect x="634" y="208" width="252" height="16" fill="#EFE9FE"/>
  <text x="760" y="205" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="14.5" font-weight="700" fill="#5733CC">Running only elsewhere?</text>
  <rect x="674" y="246" width="80" height="104" rx="9" fill="#EFF1F6" stroke="#E1E6F0"/>
  <rect x="690" y="266" width="48" height="40" rx="6" fill="#C3CCDE"/>
  <text x="714" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#aab2c2">other</text>
  <rect x="766" y="246" width="80" height="104" rx="9" fill="#F1F4FB" stroke="#5733CC" stroke-width="2"/>
  <rect x="782" y="266" width="48" height="40" rx="6" fill="#5C8FFC"/>
  <text x="806" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#5733CC">here</text>
  <path d="M756 296 h12 m-6 -5 l6 5 -6 5" stroke="#34C759" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(640,372)">
    <rect width="240" height="76" rx="11" fill="#E8F8ED"/>
    <text x="120" y="32" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="17" font-weight="800" fill="#248A3D">New window here</text>
    <text x="120" y="56" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="14" font-weight="600" fill="#3aa05a">via a per-app strategy</text>
  </g>

  <text x="460" y="500" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="15" font-weight="600" fill="#6E6E73">The app always opens on the desktop in front of you.</text>
</svg>
